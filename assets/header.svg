<svg width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #282828; }
    .titlebar { fill: #3c3836; }
    .text { fill: #ebdbb2; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 16px; }
    .prompt { fill: #98971a; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 16px; }
    .output { fill: #d65d0e; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 16px; font-weight: bold; }
    .comment { fill: #928374; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 14px; }
    .title { fill: #a89984; font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 13px; }
    .dot-red { fill: #cc241d; }
    .dot-yellow { fill: #d79921; }
    .dot-green { fill: #98971a; }
  </style>

  <!-- Window frame -->
  <rect class="bg" x="0" y="0" width="800" height="220" rx="10" ry="10"/>

  <!-- Title bar -->
  <rect class="titlebar" x="0" y="0" width="800" height="36" rx="10" ry="10"/>
  <rect class="titlebar" x="0" y="20" width="800" height="16"/>

  <!-- Traffic lights -->
  <circle class="dot-red" cx="22" cy="18" r="7"/>
  <circle class="dot-yellow" cx="44" cy="18" r="7"/>
  <circle class="dot-green" cx="66" cy="18" r="7"/>

  <!-- Title bar text -->
  <text class="title" x="400" y="22" text-anchor="middle">jason@goblin-cave: ~</text>

  <!-- Terminal content -->
  <text class="prompt" x="24" y="72">$</text>
  <text class="text" x="44" y="72">whoami</text>
  <text class="output" x="24" y="98">goblin</text>

  <text class="prompt" x="24" y="132">$</text>
  <text class="text" x="44" y="132">cat /etc/motd</text>
  <text class="output" x="24" y="158">Neurodivergent</text>
  <text class="comment" x="185" y="158">&#183;</text>
  <text class="output" x="200" y="158">Anarchosocialist</text>
  <text class="comment" x="380" y="158">&#183;</text>
  <text class="output" x="395" y="158">Mouthy Little Gremlin</text>

  <text class="prompt" x="24" y="196">$</text>
  <text class="text" x="44" y="196" opacity="0.6">_</text>
</svg>
